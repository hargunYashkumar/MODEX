{% extends "base.html" %} {% block title %}Resume Preview - Resume Generator{%
endblock %} {% block content %}
<div class="row">
  <div class="col-12">
    <!-- Action Buttons -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2><i class="fas fa-eye me-2"></i>Resume Preview</h2>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="printResume()">
          <i class="fas fa-print me-2"></i>Print
        </button>
        <button class="btn btn-success" onclick="downloadPDF()">
          <i class="fas fa-download me-2"></i>Download PDF
        </button>
        <a
          href="{{ url_for('main.raw_data_form') }}"
          class="btn btn-outline-secondary"
        >
          <i class="fas fa-plus me-2"></i>Create New
        </a>
        {% if resume_id %}
        <a
          href="{{ url_for('main.list_resumes') }}"
          class="btn btn-outline-info"
        >
          <i class="fas fa-list me-2"></i>My Resumes
        </a>
        {% endif %}
      </div>
    </div>

    <!-- Resume Preview -->
    <div
      class="resume-preview-container"
      style="
        background: white;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        margin: 0 auto;
      "
    >
      <div id="resume-content">{{ resume_html|safe }}</div>
    </div>
  </div>
</div>
{% endblock %} {% block scripts %}
<script>
  function printResume() {
    const printContent = document.getElementById("resume-content").innerHTML;
    const originalContent = document.body.innerHTML;

    document.body.innerHTML = printContent;
    window.print();
    document.body.innerHTML = originalContent;
    location.reload();
  }

  function downloadPDF() {
    // This would integrate with a PDF generation library
    // For now, show print dialog
    alert(
      "PDF download feature would be implemented with a backend PDF generation service."
    );
    printResume();
  }
</script>
{% endblock %}
